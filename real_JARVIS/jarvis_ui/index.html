<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS PRIME</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-glow bg-glow-blue"></div>
    <div class="bg-glow bg-glow-cyan"></div>
    
    <div class="container-fluid h-100 p-4">
        <!-- Header -->
        <header class="glass-panel p-3 mb-4 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="status-indicator me-3" id="connection-status"></div>
                <h1 class="m-0 text-gradient title-font">J.A.R.V.I.S. <span class="fw-light">PRIME</span></h1>
            </div>
            <div class="clock font-monospace text-cyan" id="sys-clock">00:00:00</div>
        </header>

        <div class="row h-100 g-4">
            <!-- Left Panel: System Stats -->
            <div class="col-md-3">
                <div class="glass-panel h-100 p-4 d-flex flex-column">
                    <h5 class="text-uppercase text-muted mb-4"><i class="fa-solid fa-microchip me-2"></i>Core Telemetry</h5>
                    
                    <div class="stat-block mb-4">
                        <label>CPU Utilization</label>
                        <div class="progress mt-2" style="height: 10px;">
                            <div class="progress-bar bg-cyan progress-bar-striped progress-bar-animated" id="cpu-bar" style="width: 0%"></div>
                        </div>
                        <div class="text-end mt-1 font-monospace text-small" id="cpu-text">0%</div>
                    </div>
                    
                    <div class="stat-block mb-4">
                        <label>Memory Allocation</label>
                        <div class="progress mt-2" style="height: 10px;">
                            <div class="progress-bar bg-blue progress-bar-striped progress-bar-animated" id="ram-bar" style="width: 0%"></div>
                        </div>
                        <div class="text-end mt-1 font-monospace text-small" id="ram-text">0%</div>
                    </div>
                    
                    <div class="mt-auto">
                        <button class="btn btn-outline-cyan w-100" onclick="sendSystemCheck()">
                            <i class="fa-solid fa-rotate me-2"></i>Refresh Stats
                        </button>
                    </div>
                </div>
            </div>

            <!-- Center Panel: Intelligence Feed -->
            <div class="col-md-6 d-flex flex-column">
                <div class="glass-panel p-4 flex-grow-1 d-flex flex-column mb-4" style="overflow: hidden;">
                    <div class="chat-feed flex-grow-1 mb-3" id="chat-feed">
                        <!-- Messages injected here -->
                        <div class="msg system-msg">
                            <i class="fa-solid fa-bolt me-2 text-warning"></i>System Boot Sequence Initiated...
                        </div>
                    </div>
                    
                    <!-- Visualizer -->
                    <div class="visualizer-container mb-3 d-none" id="audio-visualizer">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    
                    <!-- Input -->
                    <div class="input-group glass-input">
                        <span class="input-group-text bg-transparent border-0 text-cyan">
                            <i class="fa-solid fa-terminal"></i>
                        </span>
                        <input type="text" class="form-control bg-transparent border-0 text-white font-monospace shadow-none" 
                               id="cmd-input" placeholder="Awaiting protocol vector..." autocomplete="off">
                        <button class="btn btn-cyan" id="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Tasks / Plugins -->
            <div class="col-md-3">
                <div class="glass-panel h-100 p-4">
                    <h5 class="text-uppercase text-muted mb-4"><i class="fa-solid fa-list-check me-2"></i>Active Directives</h5>
                    <ul class="list-unstyled task-list" id="task-list">
                        <li class="text-muted fst-italic">No active directives.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
